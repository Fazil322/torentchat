# ─── TorentChat Desktop: Build .msi + .exe ────────────────────────────────────
# Builds the Compose Desktop app into a Windows .msi installer and .exe.
# The artifact is downloadable from the Actions tab.

name: Build Desktop

on:
  push:
    branches: [main, master]
    paths:
      - 'desktop-app/**'
      - '.github/workflows/build-desktop.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'desktop-app/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: desktop-app

jobs:
  build:
    name: Build Windows .msi + .exe
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 🔑 Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.8 --distribution-type bin

      - name: 🔨 Build & package desktop app (debug, no ProGuard)
        run: ./gradlew packageDistributionForCurrentOS --no-daemon --stacktrace

      - name: 📤 Upload all installers
        uses: actions/upload-artifact@v4
        with:
          name: torentchat-desktop-installers
          path: |
            desktop-app/build/compose/binaries/**/*.msi
            desktop-app/build/compose/binaries/**/*.exe
          retention-days: 30
          if-no-files-found: warn
