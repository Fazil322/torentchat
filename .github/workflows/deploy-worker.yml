# ─── TorentChat: Deploy Cloudflare Worker ─────────────────────────────────────
# Deploys the signaling/KV relay to Cloudflare's edge on every push to main
# that touches files under worker/.
#
# Required GitHub Secrets (see docs/CI_CD_SETUP.md):
#   CLOUDFLARE_API_TOKEN  — Cloudflare API token with "Workers Scripts:Edit" + "Workers KV Storage:Edit"
#   CLOUDFLARE_ACCOUNT_ID — your Cloudflare account ID
#
# ⚠️  NEVER hardcode tokens in this file. Always use GitHub Secrets.

name: Deploy Worker

on:
  push:
    branches: [main, master]
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch: # manual trigger from Actions tab

defaults:
  run:
    working-directory: worker

jobs:
  deploy:
    name: Deploy to Cloudflare Edge
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: 📥 Install dependencies
        run: npm ci || npm install

      - name: 🔍 Typecheck
        run: npx tsc --noEmit
        continue-on-error: true # don't block deploy on type-only issues during dev

      - name: 🚀 Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          # wrangler.toml references KV namespace IDs — they must already exist.
          # The deploy only updates the Worker code; KV namespaces are created
          # once manually (see docs/DEPLOY.md step 1.4).

      - name: ✅ Health check
        run: |
          sleep 5
          # The deploy output includes the Worker URL. We do a basic liveness check.
          echo "Worker deployed. Verify at your *.workers.dev URL /health endpoint."
