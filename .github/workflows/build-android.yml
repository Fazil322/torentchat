# ─── TorentChat: Build Android APK ────────────────────────────────────────────
# Builds a debug APK on every push to main and on every PR.
# Uploads the APK as a build artifact (downloadable from the Actions tab).
#
# Required GitHub Secrets (see docs/CI_CD_SETUP.md):
#   SIGNALING_RELAY_URL — your deployed Cloudflare Worker URL (injected into BuildConfig)
#
# ⚠️  No tokens needed here — the built-in GITHUB_TOKEN is used for artifact uploads.

name: Build Android

on:
  push:
    branches: [main, master]
    paths:
      - 'android-app/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'android-app/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: android-app

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools build-tools;34.0.0 platforms;android-34'

      - name: 📦 Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 🔑 Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.8 --distribution-type bin

      - name: 🔐 Generate release keystore
        run: |
          keytool -genkeypair -v \
            -keystore android-app/release.keystore \
            -alias torentchat \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass torentchat2026 \
            -keypass torentchat2026 \
            -dname "CN=TorentChat, OU=Dev, O=TorentChat, L=Jakarta, ST=Jakarta, C=ID"

      - name: 🔨 Build RELEASE APK (signed + ProGuard)
        env:
          SIGNALING_RELAY_URL: ${{ secrets.SIGNALING_RELAY_URL }}
          KEYSTORE_PATH: ${{ github.workspace }}/android-app/release.keystore
          KEYSTORE_PASSWORD: torentchat2026
          KEY_ALIAS: torentchat
          KEY_PASSWORD: torentchat2026
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: 📤 Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: torentchat-release-apk
          path: android-app/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: 📊 Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            android-app/app/build/reports
            android-app/build/reports
          retention-days: 7
          if-no-files-found: ignore
