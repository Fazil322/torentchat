# ─── TorentChat CLI: Build fat JAR ────────────────────────────────────────────
name: Build CLI

on:
  push:
    branches: [main, master]
    paths:
      - 'cli-app/**'
      - '.github/workflows/build-cli.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'cli-app/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: cli-app

jobs:
  build:
    name: Build fat JAR
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 🔑 Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.8 --distribution-type bin

      - name: 🔨 Build fat JAR
        run: ./gradlew jar --no-daemon --stacktrace

      - name: 📤 Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: torentchat-cli
          path: cli-app/build/libs/torentchat-cli-*.jar
          retention-days: 30
          if-no-files-found: error
