# ─── TorentChat Web: Build + Deploy to Vercel ─────────────────────────────────
# Build dulu (next build), deploy ke Vercel HANYA jika build lulus.

name: Build & Deploy Web

on:
  push:
    branches: [main, master]
    paths:
      - 'web-app/**'
      - '.github/workflows/build-web.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'web-app/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web-app

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-app/package-lock.json

      - name: 📥 Install dependencies
        run: npm install

      - name: 🔨 Build Next.js
        run: npm run build

      - name: ✅ Build passed
        run: echo "Build successful!"

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web-app

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ▲ Install Vercel CLI
        run: npm install -g vercel@latest

      - name: 🚀 Deploy to Vercel (production)
        run: vercel --prod --yes --token="${{ secrets.VERCEL_TOKEN }}" 2>&1 | tee deploy-output.txt
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
