# ─── TorentChat Web: Build + Deploy to Vercel ─────────────────────────────────
# Build dulu (next build), deploy ke Vercel HANYA jika build lulus.

name: Build & Deploy Web

on:
  push:
    branches: [main, master]
    paths:
      - 'web-app/**'
      - '.github/workflows/build-web.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'web-app/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: web-app

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-app/package-lock.json

      - name: 📥 Install dependencies
        run: npm install

      - name: 🔍 Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: 🔨 Build Next.js
        run: npm run build

      - name: ✅ Build passed — uploading artifact
        uses: actions/upload-artifact@v4
        with:
          name: torentchat-web
          path: web-app/.next/
          retention-days: 7
          if-no-files-found: warn

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && secrets.VERCEL_TOKEN != ''
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ▲ Install Vercel CLI
        run: npm install -g vercel@latest

      - name: 🚀 Deploy to Vercel (production)
        working-directory: web-app
        run: |
          vercel --prod --yes --token="$VERCEL_TOKEN" 2>&1 | tee deploy-output.txt
          echo "## Vercel Deploy URL" >> $GITHUB_STEP_SUMMARY
          echo "$(cat deploy-output.txt | grep -oP 'https://[^\s]+')" >> $GITHUB_STEP_SUMMARY
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
