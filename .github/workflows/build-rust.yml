# ─── TorentChat Rust CLI: Build native binaries ──────────────────────────────
name: Build Rust CLI

on:
  push:
    branches: [main, master]
    paths:
      - 'rust-cli/**'
      - '.github/workflows/build-rust.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'rust-cli/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: rust-cli

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: torentchat-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: torentchat-windows-x86_64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: torentchat-macos-arm64

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 🔨 Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: 📤 Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            rust-cli/target/${{ matrix.target }}/release/torentchat
            rust-cli/target/${{ matrix.target }}/release/torentchat.exe
          if-no-files-found: warn
          retention-days: 30
