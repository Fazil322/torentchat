name: Build Rust (All Platforms)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-cli:
    name: CLI ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: torentchat-cli-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: torentchat-cli-windows.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: torentchat-cli-macos
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build CLI
        run: cargo build --release --bin torentchat --target ${{ matrix.target }}
        working-directory: rust-workspace
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: rust-workspace/target/${{ matrix.target }}/release/torentchat*

  build-desktop:
    name: Desktop ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: torentchat-desktop-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: torentchat-desktop-windows.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - name: Build Desktop
        run: cargo build --release --bin torentchat-desktop --target ${{ matrix.target }}
        working-directory: rust-workspace
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: rust-workspace/target/${{ matrix.target }}/release/torentchat-desktop*

  build-web:
    name: Web Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Web
        run: cargo build --release --bin torentchat-web
        working-directory: rust-workspace
      - uses: actions/upload-artifact@v4
        with:
          name: torentchat-web-server
          path: rust-workspace/target/release/torentchat-web

  build-android:
    name: Android APK (Rust native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-30 build-tools;30.0.3'
      - name: Install cargo-apk
        run: cargo install -q cargo-apk
      - name: Build APK (debug — no keystore needed)
        working-directory: rust-workspace/android
        run: cargo apk build
      - uses: actions/upload-artifact@v4
        with:
          name: torentchat-android-apk
          path: rust-workspace/target/debug/apk/*.apk
          if-no-files-found: error

  release:
    name: Publish to GitHub Releases
    runs-on: ubuntu-latest
    needs: [build-cli, build-desktop, build-web, build-android]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.2.0-firebase
          name: TorentChat v0.2.0 (Rust + Firebase)
          body: |
            ## 🔐 TorentChat — 100% Rust + Firebase

            Native Rust binaries. No JVM, no Node.js, no Kotlin.
            Backend: Firebase Realtime Database (signaling + peer registry).
            Messages: E2E encrypted (X25519 + AES-256-GCM + per-message ratchet + HMAC).
            Zero server storage: messages stored temporarily only when peer offline.

            ### Downloads
            - **CLI**: torentchat (Linux), torentchat.exe (Windows), torentchat (macOS)
            - **Desktop**: torentchat-desktop (Linux), torentchat-desktop.exe (Windows)
            - **Web**: torentchat-web (native server binary)
            - **Android**: torentchat-android.apk (Rust JNI, arm64)

            ### Crypto
            - X25519 key exchange (x25519-dalek)
            - AES-256-GCM encryption (aes-gcm)
            - Per-message key ratchet (forward secrecy)
            - HMAC-SHA256 authentication + integrity
            - SHA-256 key derivation

            ### Backend
            Firebase Realtime Database (chat-6641f, asia-southeast1)
            - Peer registry: lookup public key by peer ID
            - Signaling: SDP/ICE relay for WebRTC
            - Offline messages: E2E encrypted cache (read-once, auto-delete)
            - Presence: online/typing indicators
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
