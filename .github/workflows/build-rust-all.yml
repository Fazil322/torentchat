name: Build Rust (All Platforms)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-cli:
    name: CLI ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: torentchat-cli-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: torentchat-cli-windows.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: torentchat-cli-macos
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build CLI
        run: cargo build --release --bin torentchat --target ${{ matrix.target }}
        working-directory: rust-workspace
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: rust-workspace/target/${{ matrix.target }}/release/torentchat*

  build-desktop:
    name: Desktop ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: torentchat-desktop-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: torentchat-desktop-windows.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - name: Build Desktop
        run: cargo build --release --bin torentchat-desktop --target ${{ matrix.target }}
        working-directory: rust-workspace
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: rust-workspace/target/${{ matrix.target }}/release/torentchat-desktop*

  build-web:
    name: Web Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Web
        run: cargo build --release --bin torentchat-web
        working-directory: rust-workspace
      - uses: actions/upload-artifact@v4
        with:
          name: torentchat-web-server
          path: rust-workspace/target/release/torentchat-web

  build-android:
    name: Android APK (Rust native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install cargo-apk
        run: cargo install -q cargo-apk
      - name: Build APK
        working-directory: rust-workspace/android
        run: cargo apk build --release
      - uses: actions/upload-artifact@v4
        with:
          name: torentchat-android-apk
          path: rust-workspace/target/release/apk/*.apk
          if-no-files-found: error

  release:
    name: Publish to GitHub Releases
    runs-on: ubuntu-latest
    needs: [build-cli, build-desktop, build-web, build-android]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-rust
          name: TorentChat v0.1.0 (Rust Native)
          body: |
            ## 🔐 TorentChat — 100% Rust Native

            All platforms rewritten in Rust. No JVM, no Node.js, no Kotlin.

            ### Downloads
            - **CLI**: torentchat-cli-linux, torentchat-cli-windows.exe, torentchat-cli-macos
            - **Desktop**: torentchat-desktop-linux, torentchat-desktop-windows.exe
            - **Web**: torentchat-web-server
            - **Android**: torentchat-android-apk

            ### Crypto
            X25519 + AES-256-GCM (same across all platforms)

            ### Backend
            Cloudflare Worker (Rust → WASM)
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-worker:
    name: Deploy Worker to Cloudflare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install worker-build
        run: cargo install -q worker-build
      - name: Clear cache and build with newer wasm-bindgen
        working-directory: rust-workspace/worker
        run: |
          rm -rf ~/.cache/worker-build
          export WASM_BINDGEN_VERSION=0.2.95
          worker-build --release
      - name: Deploy to Cloudflare
        working-directory: rust-workspace/worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
