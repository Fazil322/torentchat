name: Build Rust (All Platforms)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-cli:
    name: CLI ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: torentchat-cli-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: torentchat-cli-windows.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: torentchat-cli-macos
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build CLI
        run: cargo build --release --bin torentchat --target ${{ matrix.target }}
        working-directory: rust-workspace
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: rust-workspace/target/${{ matrix.target }}/release/torentchat*

  build-desktop:
    name: Desktop ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: torentchat-desktop-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: torentchat-desktop-windows.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - name: Build Desktop
        run: cargo build --release --bin torentchat-desktop --target ${{ matrix.target }}
        working-directory: rust-workspace
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: rust-workspace/target/${{ matrix.target }}/release/torentchat-desktop*

  build-web:
    name: Web Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Web
        run: cargo build --release --bin torentchat-web
        working-directory: rust-workspace
      - uses: actions/upload-artifact@v4
        with:
          name: torentchat-web-server
          path: rust-workspace/target/release/torentchat-web

  build-android:
    name: Android APK (Rust native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install cargo-apk
        run: cargo install -q cargo-apk
      - name: Build APK
        working-directory: rust-workspace/android
        run: cargo apk build --release
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: torentchat-android-apk
          path: rust-workspace/android/target/release/apk/*.apk
          if-no-files-found: warn

  deploy-worker:
    name: Deploy Rust Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-bindgen-cli (latest)
        run: cargo install -q wasm-bindgen-cli
      - name: Install worker-build (latest)
        run: cargo install -q worker-build
      - name: Build Worker (WASM)
        working-directory: rust-workspace/worker
        run: worker-build --release
      - name: Deploy to Cloudflare
        working-directory: rust-workspace/worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
