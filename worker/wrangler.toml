name = "torentchat-worker"
main = "src/index.ts"
compatibility_date = "2024-07-01"
compatibility_flags = ["nodejs_compat"]

# ─── Workers KV Namespaces ────────────────────────────────────────────────────
# Signaling: ephemeral SDP/ICE offer-answer relay (TTL 60s)
# Pending:   E2E-encrypted offline message cache (TTL 7 days, client-set)
# Presence:  online/typing ephemeral state (TTL 30s)
#
# Create these namespaces BEFORE deploying:
#   npx wrangler kv namespace create SIGNALING
#   npx wrangler kv namespace create PENDING
#   npx wrangler kv namespace create PRESENCE
#
# Then paste the returned IDs below.

[[kv_namespaces]]
binding = "SIGNALING"
id = "5959fc8461264650aaa3cf26f58776ed"

[[kv_namespaces]]
binding = "PENDING"
id = "ddba4e87ea834f8cbaa23b662c4e9474"

[[kv_namespaces]]
binding = "PRESENCE"
id = "24a4202efd8d4d0baf2daf35cffcf881"

# ─── Security headers ─────────────────────────────────────────────────────────
[vars]
MAX_PENDING_PER_USER = "100"
MAX_PENDING_TTL_SECONDS = "604800"
SIGNALING_TTL_SECONDS = "60"
PRESENCE_TTL_SECONDS = "60"
